services:
  database:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: bisort_console_user
      POSTGRES_PASSWORD: root
      POSTGRES_DB: bisort_console
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  testing-database:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: bisort_console_test_user
      POSTGRES_PASSWORD: root
      POSTGRES_DB: cognea_test
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cognea_test"]
      interval: 5s
      timeout: 5s
      retries: 10
