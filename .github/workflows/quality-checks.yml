name: Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Composer Quality
    runs-on: ubuntu-latest

    services:
        testing-database:
            image: postgres:18-alpine
            env:
                POSTGRES_USER: postgres
                POSTGRES_PASSWORD: root
                POSTGRES_DB: bisort_console_test
            ports:
                - 5433:5432
            options: >-
                --health-cmd "pg_isready -U postgres -d bisort_console_test"
                --health-interval 5s
                --health-timeout 5s
                --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, simplexml
          coverage: none

      - name: Prepare app
        run: |
            echo "DATABASE_URL='postgresql://postgres:root@127.0.0.1:5433/bisort_console_test?serverVersion=16&charset=utf8'" >> .env

      - name: Validate Composer files
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run quality checks
        run: composer quality
